version: "2"

linters:
  enable:
    - contextcheck
    - copyloopvar
    - depguard
    - dupl
    - gocritic
    - gocyclo
    - gosec
    - importas
    - misspell
    - nakedret
    - nolintlint
    - prealloc
    - revive
    - unconvert
    - whitespace
  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: github.com/pkg/errors
              desc: Please use "errors" package from standard library
            - pkg: gotest.tools/v3
              desc: Please keep tests unified using only github.com/stretchr/testify
            - pkg: log
              desc: Please keep logging unified using only github.com/sirupsen/logrus
    gocritic:
      disabled-checks:
        - ifElseChain
    gocyclo:
      min-complexity: 20
    importas:
      alias:
        - pkg: github.com/sirupsen/logrus
          alias: log
        - pkg: github.com/stretchr/testify/assert
          alias: assert
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # gosec rules not enforced in v1; enable incrementally
      - linters: [gosec]
        text: "G101|G115|G117"
      # staticcheck style suggestions not enforced in v1
      - linters: [staticcheck]
        text: "ST1005|ST1019|QF1003|QF1008|QF1012"
      # prealloc was enabled in v1 but these findings were suppressed
      - linters: [prealloc]
        text: "Consider preallocating"
    paths:
      - report
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - goimports
  exclusions:
    generated: lax
    paths:
      - report
      - third_party$
      - builtin$
      - examples$
