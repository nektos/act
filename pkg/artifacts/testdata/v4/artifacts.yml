on:
  push:
jobs:
  _5:
    runs-on: ubuntu-latest
    steps: 
    - run: env
    - env:
        GITHUB_CTX: ${{ toJSON(github) }}
        INPUTS_CTX: ${{ toJSON(inputs) }}
        MATRIX_CTX: ${{ toJSON(matrix) }}
        NEEDS_CTX: ${{ toJSON(needs) }}
        STRATEGY_CTX: ${{ toJSON(strategy) }}
      run: |
        {
          echo "github:"
          echo "$GITHUB_CTX"
          echo "inputs:"
          echo "$INPUTS_CTX"
          echo "matrix:"
          echo "$MATRIX_CTX"
          echo "needs:"
          echo "$NEEDS_CTX"
          echo "strategy:"
          echo "$STRATEGY_CTX"
        } > context.txt
      shell: bash
    - run: echo Artifact2 > data.txt

    - uses: actions/upload-artifact@v4
      with:
        name: test
        path: context.txt

    - uses: actions/upload-artifact@v4
      with:
        name: test2
        path: data.txt

    - uses: actions/download-artifact@v4
      with:
        name: test
        path: out
    - run: cat out/context.txt

    - name: assert
      run: |
        [[ "$(cat context.txt)" = "$(cat out/context.txt)" ]] || exit 1
      shell: bash

    - run: |
        No content        
      shell: cp {0} context.txt
    - uses: actions/upload-artifact@v4
      with:
        name: test
        path: context.txt
        overwrite: true
  
    - uses: actions/download-artifact@v4
      with:
        name: test
        path: out2
    - run: cat out2/context.txt

    - name: assert 2
      run: |
        [[ "$(cat context.txt)" = "$(cat out2/context.txt)" ]] || exit 1
      shell: bash

    - uses: actions/download-artifact@v4
      with:
        name: test2
        path: out3
    - run: cat out3/data.txt

    - name: assert 3
      run: |
        [[ "$(cat data.txt)" = "$(cat out3/data.txt)" ]] || exit 1
      shell: bash

    - uses: actions/download-artifact@v4
      with:
        pattern: "test*"
        path: out4
        merge-multiple: true

    - run: cat out4/data.txt
    - run: cat out4/context.txt

    - name: assert 4
      run: |
        [[ "$(cat context.txt)" = "$(cat out4/context.txt)" ]] || exit 1
        [[ "$(cat data.txt)" = "$(cat out4/data.txt)" ]] || exit 1
      shell: bash
