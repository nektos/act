name: CI
on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "releases/*"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: 
            - 20
            - 22
            - 24
            - 25
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Test
        run: npm run test